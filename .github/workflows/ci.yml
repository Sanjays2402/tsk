name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Verify go.sum integrity
        run: |
          go mod verify
          go mod download
      # go mod tidy -diff is flaky on Windows due to go.sum line-ending
      # handling; run it only on Linux where diff semantics are stable.
      - name: Check go.mod/go.sum are tidy
        if: matrix.os == 'ubuntu-latest'
        run: go mod tidy -diff
      - run: go vet ./...
      - run: go test -race -cover ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      # v8+ of the action pulls the v2 golangci-lint binary that our
      # .golangci.yml targets. v6 defaulted to 1.64 which is v1-only.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6
