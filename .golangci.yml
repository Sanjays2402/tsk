version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
